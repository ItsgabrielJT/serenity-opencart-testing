serenity {

  driver = chrome
  browser.maximized = true

  webdriver {
    driver = chrome
    autodownload = true
    chrome.switches = "--no-sandbox;--disable-dev-shm-usage;--disable-gpu;--remote-allow-origins=*"
  }

  base.url = "http://opencart.abstracta.us/"

  take.screenshots = FOR_FAILURES
  screenshots.directory = target/serenity-reports/screenshots

  webdriver.timeouts.implicitlywait = 5000
  webdriver.wait.for.timeout = 15000

  report.test.durations = false
  history.directory = "history"
  outputDirectory = target/serenity-reports

  parallel.tests = 1

  webdriver.quit.dontQuitAfterEachScenario = false
  webdriver.provided.type = provided
  
  tags = ""
}

environments {
  default {
    base.url = "http://opencart.abstracta.us/"
  }
  staging {
    base.url = "http://staging.opencart.abstracta.us/"
  }
}
